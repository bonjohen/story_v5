name: Deploy Scripts Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Copy script data to public
        run: mkdir -p app/public/data && cp -r data/scripts app/public/data/scripts

      - name: Build scripts site
        working-directory: app
        run: npm run build:scripts

      - name: Copy 404.html for SPA routing
        run: cp app/dist-scripts/scripts-site.html app/dist-scripts/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist-scripts

      - id: deployment
        uses: actions/deploy-pages@v4
